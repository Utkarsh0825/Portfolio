<!DOCTYPE html>
<html lang="en">

<head>
    <title>Payment Form</title>
    <link rel="stylesheet" href="payment.css">
</head>

<body>
    <div class="containers">
    <form action="" method="get">
        
        <h1 class="main_heading">Payment Form</h1>
        <h2>User Information</h2>
        <p> Name &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <input type="text" name="name" required></p>
        <p>Last Name <input type="text" name="Last Name"></p>
        <p>

        <fieldset>
            <legend>Gender</legend>
            Male <input type="radio" type="gender" id="male">
            Female <input type="radio" type="gender" id="female">
        </fieldset>
        </p>
        <fieldset>
            <legend>Address</legend>
            <p> <textarea name="address" id="add" cols="40" rows="5"></textarea></p>
        </fieldset>
        <p>
            Email
            <input type="email" name="email" id="">
        </p>
        <p>Pincode
            <input type="number" name="pin" id="">
        </p>
        <hr>
        <hr>
        <h1>Payment Information</h1>

        <label for="cars">Choose a Card:</label>

        <select name="Cards" id="cards">
            <option value="Rupay">Rupay</option>
            <option value="Mastercard">Mastercard</option>
            <option value="Masterunon">Masterunion</option>
            <option value="Visa">Visa</option>
        </select>
        <p>Card Number
            <input type="number" name="card" id="" min="16" max="16">
        </p>
        <p>Expiry
            <input type="month" name="expiry" id="">
        </p>
        <p>CVV
            <input type="password" name="cvv" max="3" min="3">
        </p>
        <input type="submit" value="Pay Now">
        <input type="submit" value="reset">

    </form>
    </div>
</body>

</html>
